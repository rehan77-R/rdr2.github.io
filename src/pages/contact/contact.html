<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact RDR2</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-blue-200 font-sans">

  <!-- Navigation -->
  <nav class="bg-blue-100 shadow-md sticky top-0">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex justify-between items-center h-15">

        <div class="text-2xl font-bold text-blue-800">
          RDR2
        </div>

        <div class="space-x-6">
          <a href="../../../index.html" class="text-gray-700 hover:text-blue-600">Home</a>
          <a href="../../pages/about/about.html" class="text-gray-700 hover:text-blue-600">About</a>
          <a href="./contact.html" class="text-gray-700 hover:text-blue-700">Contact</a>
        </div>

      </div>
    </div>
  </nav>

  <!-- Contact Section -->
  <section class="py-15">
    <div class="max-w-3xl mx-auto bg-blue-100 px-6 shadow-lg rounded-xl">

      <h1 class="text-3xl font-bold text-center mb-6 text-blue-600">
        Contact Us
      </h1>

      <p class="text-center text-gray-600 mb-8">
        Fill the form below and we will get back to you.
      </p>

      <!-- Contact Form -->
      <form class="space-y-4">

        <input 
        type="text"
        name="name"
        placeholder="Enter Your Name"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
        />

        <input 
        type="email"
        name="email"
        placeholder="Enter Your Email"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
        />

        <input 
        type="password"
        name="password"
        placeholder="Enter Your Password"
        minlength="8"
        maxlength="15"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <input 
        type="number"
        name="age"
        placeholder="Enter Your Age"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <textarea
        placeholder="Enter Your Message"
        rows="4"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        ></textarea>

        <button
        type="submit"
        class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-700 transition">
        Send Message
        </button>

      </form>

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white text-center py-4">
    <p>© 2026 MyWebsite. All rights reserved.</p>
  </footer>

</body>
</html>

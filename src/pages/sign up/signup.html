<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - RDR2 PC Parts</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Rajdhani', sans-serif; }
    .logo-font { font-family: 'Orbitron', monospace; }
    .hero-bg { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
    .glow { text-shadow: 0 0 20px #6366f1; }
    .nav-glass { background: rgba(15,12,41,0.95); backdrop-filter: blur(10px); }
    .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(99,102,241,0.3); color: white; transition: border-color 0.3s; }
    .input-style:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .input-style::placeholder { color: rgba(255,255,255,0.3); }
    .card-bg { background: linear-gradient(145deg, #1e1b4b, #0f0c29); border: 1px solid rgba(99,102,241,0.3); }
    .btn-glow:hover { box-shadow: 0 0 25px rgba(99,102,241,0.6); }
  </style>
</head>
<body class="min-h-screen hero-bg flex flex-col">

  <!-- Navbar -->
  <!-- index.html is 3 levels up: sign up -> pages -> src -> root -->
  <nav class="nav-glass border-b border-indigo-900 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">
        <a href="../../../index.html" class="logo-font text-xl font-bold text-indigo-400 glow tracking-widest">RDR2</a>
        <div class="flex space-x-6 items-center">
          <a href="../../../index.html"          class="text-gray-400 hover:text-white transition font-semibold">🏠 Home</a>
          <a href="../about/about.html"          class="text-gray-400 hover:text-white transition font-semibold">About</a>
          <a href="../contact/contact.html"      class="text-gray-400 hover:text-white transition font-semibold">Contact</a>
          <a href="../sign in/signin.html"       class="px-4 py-2 border border-indigo-500 text-indigo-300 rounded-lg hover:bg-indigo-900 transition font-semibold">Sign In</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Form -->
  <div class="flex-1 flex items-center justify-center py-12 px-4">
    <div class="card-bg rounded-2xl shadow-2xl p-10 w-full max-w-md">

      <div class="text-center mb-8">
        <div class="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-sm mx-auto mb-3 logo-font border-2 border-indigo-400">RDR2</div>
        <h1 class="logo-font text-2xl font-bold text-white">Create Account</h1>
        <p class="text-indigo-300 text-sm mt-1">Join RDR2 PC Parts Store</p>
      </div>

      <!-- Success -->
      <div id="successMsg" class="hidden bg-green-900 border border-green-500 text-green-300 rounded-lg p-4 mb-6 text-center font-semibold">
        ✅ Account created! Redirecting to Sign In...
      </div>
      <!-- Error -->
      <div id="errorMsg" class="hidden bg-red-900 border border-red-500 text-red-300 rounded-lg p-4 mb-6 text-center font-semibold"></div>

      <form id="signupForm" onsubmit="handleSignup(event)">

        <div class="flex gap-3 mb-4">
          <div class="w-1/2">
            <label class="block text-sm font-semibold text-indigo-300 mb-1">First Name</label>
            <input id="firstName" type="text" placeholder="Ali" class="input-style w-full rounded-lg px-4 py-2.5 text-sm" required/>
          </div>
          <div class="w-1/2">
            <label class="block text-sm font-semibold text-indigo-300 mb-1">Last Name</label>
            <input id="lastName" type="text" placeholder="Khan" class="input-style w-full rounded-lg px-4 py-2.5 text-sm" required/>
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-indigo-300 mb-1">Email Address</label>
          <input id="email" type="email" placeholder="ali@example.com" class="input-style w-full rounded-lg px-4 py-2.5 text-sm" required/>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-indigo-300 mb-1">Password</label>
          <input id="password" type="password" placeholder="Min 8 characters" minlength="8" class="input-style w-full rounded-lg px-4 py-2.5 text-sm" required/>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-semibold text-indigo-300 mb-1">Confirm Password</label>
          <input id="confirmPassword" type="password" placeholder="Repeat your password" class="input-style w-full rounded-lg px-4 py-2.5 text-sm" required/>
        </div>

        <div class="flex items-center gap-2 mb-6">
          <input type="checkbox" id="terms" class="w-4 h-4 accent-indigo-500" required/>
          <label for="terms" class="text-sm text-gray-400">
            I agree to the <a href="#" class="text-indigo-400 hover:underline font-bold">Terms & Conditions</a>
          </label>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg text-sm transition btn-glow logo-font tracking-wider">
          CREATE ACCOUNT →
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="../sign in/signin.html" class="text-indigo-400 font-bold hover:underline">Sign In</a>
      </p>
    </div>
  </div>

  <footer class="bg-gray-900 border-t border-gray-800 text-gray-500 py-4 text-center text-sm">
    © 2026 RDR2 PC Parts Store. All rights reserved.
  </footer>

<script>
function handleSignup(e) {
  e.preventDefault();
  const firstName = document.getElementById('firstName').value.trim();
  const lastName  = document.getElementById('lastName').value.trim();
  const email     = document.getElementById('email').value.trim().toLowerCase();
  const password  = document.getElementById('password').value;
  const confirm   = document.getElementById('confirmPassword').value;
  const errorMsg  = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');

  errorMsg.classList.add('hidden');

  if (password !== confirm) {
    errorMsg.textContent = '❌ Passwords do not match!';
    errorMsg.classList.remove('hidden');
    return;
  }
  if (password.length < 8) {
    errorMsg.textContent = '❌ Password must be at least 8 characters!';
    errorMsg.classList.remove('hidden');
    return;
  }

  let users = JSON.parse(localStorage.getItem('rdr2_users') || '[]');
  if (users.find(u => u.email === email)) {
    errorMsg.textContent = '❌ Account with this email already exists!';
    errorMsg.classList.remove('hidden');
    return;
  }

  users.push({ firstName, lastName, email, password, createdAt: new Date().toISOString() });
  localStorage.setItem('rdr2_users', JSON.stringify(users));

  successMsg.classList.remove('hidden');
  document.getElementById('signupForm').style.opacity = '0.4';
  document.getElementById('signupForm').style.pointerEvents = 'none';

  setTimeout(() => { window.location.href = '../sign in/signin.html'; }, 2000);
}
</script>
</body>
</html>
